name: Feature Request
description: Propose a change to the runtime, DSL, package API, or examples.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow authoring or runtime problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the API, behavior, or documentation change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Existing APIs, workarounds, or designs you considered.
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility Impact
      description: Does this affect package exports, workflow definitions, connector contracts, or persisted state?
  - type: textarea
    id: tests
    attributes:
      label: Suggested Tests
      description: What local unit, scenario, or package smoke coverage should accompany this?
