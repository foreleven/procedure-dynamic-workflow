name: Bug Report
description: Report a reproducible bug in the workflow runtime, DSL, CLI, or examples.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Include enough detail for maintainers to reproduce it without access to private credentials or production systems.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps, workflow artifact, connector stub, or command that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Send message ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or Commit
      description: Package version, git commit, or branch.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Which checks did you run?
      placeholder: npm run ci
  - type: textarea
    id: logs
    attributes:
      label: Logs and Traces
      description: Remove API keys, `.env` values, user data, and private connector payloads before posting.
      render: text
