# CLI 从 agent 目录加载时使用的 connector 文件名。
connectors:
  - main

workflows:
  presales_consultation:
    # workflow 的稳定唯一标识。
    id: presales_consultation

    # workflow artifact 版本。
    version: 1.0.0

    # workflow 的业务范围。
    description: 金融小微企业融资产品售前咨询、产品匹配、方案试算和销售线索创建

    routing:
      examples:
        - 我想了解企业周转贷款
        - 小微企业有资金需求，想看有什么方案
        - 设备采购能不能融资
        - 这个产品利率和材料是什么
        - 让销售顾问联系我
      entities:
        - customer
        - financingNeed
        - loanAmount
        - useCase
        - product
        - lead
      neighbors:
        - loan_application
        - credit_approval
        - repayment_service

cases:
  - id: working_capital_need_recommends_products
    description: 用户给出经营周转金额后，系统匹配候选产品但不创建线索。
    userId: user_feng
    turns:
      - message: 我们公司想了解经营周转资金，差不多 20 万美元。
        expect:
          responseSatisfies: 系统应基于 20 万美元经营周转需求展示候选融资产品，说明只是初步匹配，不能表示已经获批或创建销售线索。

  - id: product_detail_and_repayment_estimate
    description: 用户选择候选产品并给出期限后，系统读取产品详情并提供试算。
    userId: user_feng
    turns:
      - message: 经营周转 20 万美元。
        expect:
          responseSatisfies: 系统应推荐可选产品并引导用户选择产品或补充期限。
      - message: 看经营周转贷，按 12 个月试算。
        expect:
          responseSatisfies: 系统应说明经营周转贷的关键信息，并给出 12 个月的售前估算，强调实际结果以正式审核为准。

  - id: amount_change_requires_new_recommendation
    description: 用户更改融资金额后，系统清空旧产品选择并重新匹配。
    userId: user_feng
    turns:
      - message: 经营周转 20 万美元，想看经营周转贷。
        expect:
          responseSatisfies: 系统应围绕 20 万美元经营周转需求说明候选方案。
      - message: 金额改成 3 万美元。
        expect:
          responseSatisfies: 系统应按 3 万美元的新金额重新匹配，不能沿用旧的 20 万美元选择或试算。

  - id: followup_question_does_not_create_lead
    description: 用户只询问材料或费用时，系统回答咨询问题但不能创建销售线索。
    userId: user_feng
    turns:
      - message: 经营周转 20 万美元，看看经营周转贷。
        expect:
          responseSatisfies: 系统应说明产品信息和下一步可咨询内容。
      - message: 需要什么材料？费用大概怎么说？
        expect:
          responseSatisfies: 系统应回答材料和费用口径，不能创建销售线索或表示已安排顾问。

  - id: explicit_advisor_request_creates_lead
    description: 用户明确要求顾问联系时，系统创建销售线索。
    userId: user_feng
    turns:
      - message: 经营周转 20 万美元，选择经营周转贷。
        expect:
          responseSatisfies: 系统应确认当前咨询产品并说明仍是售前咨询。
      - message: 可以，让销售顾问联系我继续办理。
        expect:
          responseSatisfies: 系统应创建销售线索并告知会由顾问跟进，不能表示贷款已获批。

  - id: new_business_gets_starter_option
    description: 新企业用户咨询小额周转资金时，系统推荐更适合的入门产品。
    userId: user_maya
    turns:
      - message: 我们刚开业不久，想了解 3 万美元进货周转。
        expect:
          responseSatisfies: 系统应考虑新企业画像，优先给出小额或入门型产品，并说明门槛限制。

  - id: equipment_finance_path
    description: 用户咨询设备采购融资时，系统匹配设备融资方案并可试算。
    userId: user_feng
    turns:
      - message: 想买设备，可能需要 12 万美元，36 个月左右。
        expect:
          responseSatisfies: 系统应匹配设备采购相关融资方案，并可基于 36 个月做售前估算。

  - id: cancel_presales_flow
    description: 用户停止咨询后，系统不再推进推荐或创建线索。
    userId: user_feng
    turns:
      - message: 先了解下经营周转 20 万美元。
        expect:
          responseSatisfies: 系统应展示初步咨询结果。
      - message: 先不用了，暂停咨询。
        expect:
          responseSatisfies: 系统应停止当前售前咨询流程，不能继续创建线索或安排顾问。
