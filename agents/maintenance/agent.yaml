# CLI 从 agent 目录加载时使用的 connector 文件名。
connectors:
  - main

workflows:
  maintenance_booking:
    # workflow 的稳定唯一标识。
    # session.activeWorkflowIds、日志、trace、CLI 状态查看都会使用这个 id。
    id: maintenance_booking

    # workflow 版本号。
    # 未来如果同一个业务流程升级，可以用 version 区分 artifact 版本。
    version: 1.0.0

    # workflow 的自然语言描述。
    # 这里描述该流程覆盖的业务范围，供人阅读，也可被路由或生成工具参考。
    description: 车辆保养预约、修改预约、取消预约、查询预约状态

    # routing 定义这个 workflow 的“入口画像”。
    # 当没有 active workflow 时，engine 会用这些信息做本地匹配，判断用户输入是否应该进入本流程。
    routing:
      # examples 是典型用户说法。
      # 这些例子不直接执行业务，只用于说明什么样的话应该匹配到 maintenance_booking。
      examples:
        - 帮我预约保养
        - 我要改一下保养时间
        - 取消我之前的预约
        - 还是上次那家店
        - 改成周三下午

      # entities 是本流程关心的核心实体名。
      # 它们帮助路由器理解本 workflow 会围绕哪些业务对象进行状态更新。
      entities:
        - vehicle
        - dealer
        - appointment
        - service
        - preferredDate
        - slot

      # neighbors 是相邻但不属于本流程的 workflow id。
      # 这里表达“车辆诊断、投诉、保险理赔”可能和保养相关，但应该由其他 workflow 处理。
      neighbors:
        - vehicle_diagnosis
        - complaint
        - insurance_claim

# cases 是本 workflow 的交互验收场景。
# CLI 可通过 --case 或 --all-cases 逐条执行这些 case。
cases:
  - id: single_vehicle_auto_then_dealer_options
    description: 单车用户发起保养预约时，系统直接使用该车辆并进入门店选择。
    userId: user_feng
    turns:
      - message: 预约保养
        expect:
          responseSatisfies: 系统应确认单车用户的车辆已进入预约流程，并引导用户选择可用经销商。

  - id: dealer_selection_then_time_options
    description: 单车用户选择门店后，如果已经给过时间偏好，系统查询可用时段并让用户确认具体时间。
    userId: user_feng
    turns:
      - message: 预约保养，明天下午
        expect:
          responseSatisfies: 系统应在已记录明天下午偏好的前提下，先引导用户选择经销商，而不是直接选择时段或提交预约。
      - message: "1"
        expect:
          responseSatisfies: 系统应识别用户选择了第一家经销商，并展示或引导确认明天下午的具体可预约时段。

  - id: slot_selection_then_draft
    description: 用户选择具体到店时段后，系统创建预约草稿但不直接提交。
    userId: user_feng
    turns:
      - message: 预约保养，明天下午
        expect:
          responseSatisfies: 系统应先要求用户选择经销商，并不能直接创建预约草稿。
      - message: "1"
        expect:
          responseSatisfies: 系统应展示明天下午的具体可用到店时段，等待用户选择具体时段。
      - message: "1"
        expect:
          responseSatisfies: 系统应创建预约草稿并请求用户确认提交，但不能表示已经正式预约成功。

  - id: time_ack_then_draft_then_confirm
    description: 用户确认具体时段后才生成预约草稿；只有再次明确确认草稿才提交正式预约。
    userId: user_feng
    turns:
      - message: 预约保养，明天下午
        expect:
          responseSatisfies: 系统应先引导用户选择经销商，并保留用户明天下午的时间偏好。
      - message: "1"
        expect:
          responseSatisfies: 系统应展示明天下午的具体可预约时段，等待用户选择。
      - message: "1"
        expect:
          responseSatisfies: 系统应生成待确认的预约草稿，并要求用户确认是否提交。
      - message: 确认
        expect:
          responseSatisfies: 系统应告知用户预约已经正式提交成功，并展示确认后的预约信息。

  - id: draft_service_followup_before_confirm
    description: 草稿生成后，用户追问服务项目；系统说明服务项目由后续流程处理，不能提交预约。
    userId: user_feng
    turns:
      - message: 预约保养，明天下午
        expect:
          responseSatisfies: 系统应先引导用户选择经销商，并保留用户明天下午的时间偏好。
      - message: "1"
        expect:
          responseSatisfies: 系统应展示明天下午的具体可预约时段，等待用户选择。
      - message: "1"
        expect:
          responseSatisfies: 系统应生成待确认的预约草稿，并要求用户确认是否提交。
      - message: 这次保养要做什么项目？
        expect:
          responseSatisfies: 系统应说明当前流程只确认车辆、经销商和到店时间，具体保养项目由后续流程处理；不能表示预约已经提交成功，可以继续等待用户是否确认草稿。

  - id: cancel_during_vehicle_ack
    description: 用户在预约推进中取消；系统停止推进预约。
    userId: user_feng
    turns:
      - message: 预约保养
        expect:
          responseSatisfies: 系统应进入预约流程并引导用户选择经销商。
      - message: 先不约了，取消
        expect:
          responseSatisfies: 系统应表达当前保养预约流程已经停止或取消，不能继续推进预约。

  - id: multiple_vehicles_show_vehicle_options
    description: 多车用户只说预约保养；系统让用户选择车辆，不猜车。
    userId: user_alex
    turns:
      - message: 预约保养
        expect:
          responseSatisfies: 系统应发现用户有多辆车，并要求用户选择要预约保养的车辆，不能猜测车辆。

  - id: multi_vehicle_tesla_dealer_then_time
    description: 多车用户明确 Tesla 和时间后，系统先确认 4S 店，再确认具体时段。
    userId: user_alex
    turns:
      - message: Tesla Model Y 明天下午
        expect:
          responseSatisfies: 系统应识别用户选择 Tesla Model Y 和明天下午偏好，并先引导用户确认或选择可服务的经销商。
      - message: "1"
        expect:
          responseSatisfies: 系统应识别用户选择了经销商，并要求用户确认明天下午的具体到店时段。
      - message: "1"
        expect:
          responseSatisfies: 系统应基于用户选择的具体到店时段生成待确认预约草稿，并要求用户确认是否提交；不能表示已经正式预约成功。

  - id: change_time_requires_time_ack_again
    description: 已有草稿后用户改时间；系统清空旧时段和草稿，并重新让用户确认具体时间。
    userId: user_feng
    turns:
      - message: BMW X3，Hoboken BMW Service，下周三下午
        expect:
          responseSatisfies: 系统应识别车辆、经销商和下周三下午偏好，并要求用户选择具体可预约时段。
      - message: "1"
        expect:
          responseSatisfies: 系统应基于下周三下午的具体时段生成待确认预约草稿，而不是直接提交。
      - message: 改成明天下午
        expect:
          responseSatisfies: 系统应识别用户修改了时间偏好，清空旧草稿并重新要求用户选择明天下午的具体时段。
      - message: "1"
        expect:
          responseSatisfies: 系统应基于用户重新选择的明天下午具体时段生成新的待确认预约草稿，并要求用户确认提交；不能沿用旧的下周三草稿或表示已正式预约成功。

  - id: explicit_previous_dealer_still_confirms_time
    description: 用户明确说上次门店且给出时间；系统可使用最近门店，但仍必须让用户确认具体时段。
    userId: user_wang
    turns:
      - message: MINI Cooper S，还是上次那家，明天下午
        expect:
          responseSatisfies: 系统可以使用用户明确提出的上次门店和明天下午偏好，但仍必须要求用户确认具体到店时段。
      - message: "1"
        expect:
          responseSatisfies: 系统应基于用户选择的具体到店时段生成待确认预约草稿，并要求用户确认是否提交；不能表示已经正式预约成功。
